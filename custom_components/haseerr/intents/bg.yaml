language: bg
intents:
  RequestMedia:
    data:
      - sentences:
          - "свали {title}"
          - "намери {title}"
          - "добави {title} в (Seerr|Plex|Jellyfin)"
          - "можеш ли да (свалиш|намериш) {title}"
          - "моля (свали|намери) {title}"
          - "(свали|намери) {title} сезон {season}"
        slots:
          title: { wildcard: true }
          season: { wildcard: true, optional: true }
  ConfirmRequest:
    data:
      - sentences:
          - "да"
          - "да моля"
          - "потвърди"
          - "давай"
  CancelRequest:
    data:
      - sentences:
          - "не"
          - "отказ"
          - "забрави"
