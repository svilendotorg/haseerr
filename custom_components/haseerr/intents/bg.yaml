language: bg
intents:
  RequestMedia:
    data:
      - sentences:
          - "(изтегли|истегли) {title}"
          - "(изтегли|истегли) ми {title}"
          - "намери {title}"
          - "намери ми {title}"
          - "добави {title} в (Seerr|Plex|Jellyfin)"
          - "можеш ли да (изтеглиш|истеглиш|намериш) {title}"
          - "моля да (изтеглиш|истеглиш|намериш) {title}"
          - "моля (изтегли|истегли|намери) {title}"
        slots:
          title: "{title}"
      - sentences:
          - "(изтегли|истегли|намери) {title} сезон {season}"
        slots:
          title: "{title}"
          season: "{season}"
  ConfirmRequest:
    data:
      - sentences:
          - "да"
          - "да моля"
          - "потвърди"
          - "давай"
  CancelRequest:
    data:
      - sentences:
          - "не"
          - "отказ"
          - "забрави"
lists:
  title:
    wildcard: true
  season:
    wildcard: true
