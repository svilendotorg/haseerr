language: en
intents:
  RequestMedia:
    data:
      - sentences:
          - "(request|download|downward|find|search|get me) {title}"
          - "(can you|please) (request|download|downward|find|search|get me) {title}"
          - "add {title} to (Seerr|Plex|Jellyfin)"
        slots:
          title: "{title}"
      - sentences:
          - "(request|download|downward|find|search|get me) {title} season {season}"
        slots:
          title: "{title}"
          season: "{season}"
  ConfirmRequest:
    data:
      - sentences:
          - "yes"
          - "yes please"
          - "yep"
          - "confirm"
          - "go ahead"
          - "do it"
  CancelRequest:
    data:
      - sentences:
          - "no"
          - "cancel"
          - "abort"
          - "never mind"
          - "nevermind"
lists:
  title:
    wildcard: true
  season:
    wildcard: true
